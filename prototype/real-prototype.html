<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水产品加工监管系统 - 真实功能原型</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
  <style>
    :root {
      --primary: #2d79ea; --primary-dark: #1e5fc7; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --bg: #f3f5f8; --sidebar: #0a3f79; --text-main: #17324f; --text-secondary: #6f7e92;
      --card-bg: #ffffff; --border: #e6edf7; --radius: 14px; --shadow: 0 2px 12px rgba(15,52,96,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Nunito","Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background: var(--bg); color: var(--text-main); overflow: hidden; }
    .app { display: flex; height: 100vh; }
    .sidebar { width: 260px; background: var(--sidebar); color: rgba(235,242,255,0.9); display: flex; flex-direction: column; transition: width .3s; overflow-y: auto; }
    .sidebar.collapsed { width: 72px; }
    .brand { display: flex; align-items: center; gap: 12px; padding: 20px 18px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .brand-icon { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .brand-text strong { display: block; font-size: 17px; color: #fff; }
    .brand-text span { display: block; font-size: 11px; color: rgba(224,235,255,0.65); margin-top: 4px; }
    .sidebar.collapsed .brand-text { display: none; }
    .nav { padding: 12px 10px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .nav-group { margin-bottom: 10px; }
    .nav-label { padding: 8px 14px 6px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(224,235,255,0.5); }
    .sidebar.collapsed .nav-label { display: none; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 10px; cursor: pointer; transition: all .2s; border: none; background: transparent; color: inherit; width: 100%; text-align: left; font-size: 14px; position: relative; }
    .nav-item:hover { background: rgba(255,255,255,0.08); }
    .nav-item.active { background: var(--primary); color: #fff; }
    .nav-item.active::before { content: ''; position: absolute; left: -6px; top: 8px; bottom: 8px; width: 3px; border-radius: 99px; background: #fff; }
    .nav-item i, .nav-item .mdi { font-size: 18px; width: 22px; text-align: center; }
    .sidebar.collapsed .nav-item span:not(.mdi) { display: none; }
    .sidebar.collapsed .nav-item { justify-content: center; padding: 12px; }
    .sidebar.collapsed .nav-item.active::before { display: none; }
    .submenu { max-height: 0; overflow: hidden; transition: max-height .3s; display: flex; flex-direction: column; gap: 2px; padding-left: 12px; }
    .submenu.open { max-height: 400px; }
    .submenu .nav-item { font-size: 13px; padding: 8px 14px; margin-left: 8px; width: calc(100% - 8px); }
    .sidebar.collapsed .submenu { display: none; }
    .badge { margin-left: auto; background: var(--danger); color: #fff; font-size: 11px; padding: 1px 6px; border-radius: 10px; font-weight: 700; }
    .sidebar.collapsed .badge { position: absolute; top: 6px; right: 6px; margin: 0; }

    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    .topbar { height: 64px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .toggle-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border); background: #f8fafc; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-main); }
    .page-title strong { font-size: 20px; display: block; }
    .page-title span { font-size: 12px; color: var(--text-secondary); }
    .topbar-right { display: flex; align-items: center; gap: 18px; }
    .topbar-icon { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: #f8fafc; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
    .notif-dot { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; position: absolute; top: 2px; right: 2px; border: 2px solid #f8fafc; }
    .user-chip { display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); border-radius: 999px; padding: 4px 14px 4px 4px; cursor: pointer; background: #fff; }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .user-name strong { font-size: 13px; display: block; }
    .user-name span { font-size: 11px; color: var(--text-secondary); }

    .content { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .breadcrumb { margin-bottom: 16px; font-size: 13px; color: var(--text-secondary); }
    .breadcrumb a { color: var(--primary); cursor: pointer; }
    .breadcrumb span { color: #999; }

    .card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-header h3 { font-size: 16px; font-weight: 600; }
    .card-header p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .card-body { padding: 20px; }

    .status-ribbon { display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .status-ribbon .step { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); flex-shrink: 0; }
    .status-ribbon .step .dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #edf2f8; color: #8b97a6; font-size: 14px; border: 2px solid #e3eaf4; }
    .status-ribbon .step.done .dot { background: #ecfdf3; color: var(--success); border-color: #a7f3d0; }
    .status-ribbon .step.fail .dot { background: #fef2f2; color: var(--danger); border-color: #fecaca; }
    .status-ribbon .step.current .dot { background: #eff6ff; color: var(--primary); border-color: #bfdbfe; box-shadow: 0 0 0 3px rgba(45,121,234,0.15); }
    .status-ribbon .line { flex: 1; height: 2px; background: #e3eaf4; border-radius: 2px; min-width: 30px; }
    .status-ribbon .line.done { background: #a7f3d0; }
    .status-ribbon .line.current { background: #bfdbfe; }

    .info-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .info-cell { background: #fbfcfe; border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; }
    .info-cell .label { font-size: 12px; color: var(--text-secondary); }
    .info-cell .value { font-size: 18px; font-weight: 700; color: var(--text-main); }
    .tag { display: inline-block; padding: 2px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; width: fit-content; }
    .tag-green { background: #d1fae5; color: #047857; }
    .tag-red { background: #fee2e2; color: #b91c1c; }
    .tag-blue { background: #dbeafe; color: #1d4ed8; }
    .tag-gray { background: #f3f4f6; color: #4b5563; }
    .tag-orange { background: #ffedd5; color: #c2410c; }

    .tabs { display: flex; gap: 4px; background: #f8fafc; padding: 6px; border-radius: 12px; width: fit-content; margin-bottom: 20px; }
    .tab { padding: 8px 18px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-secondary); border: none; background: transparent; transition: all .2s; }
    .tab:hover { color: var(--text-main); }
    .tab.active { background: #fff; color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--border); }
    th { background: #f6f9ff; font-weight: 600; color: var(--text-main); font-size: 13px; }
    tr:hover { background: #fafcff; }

    .timeline { display: flex; flex-direction: column; gap: 0; position: relative; padding-left: 28px; }
    .timeline::before { content: ''; position: absolute; left: 11px; top: 8px; bottom: 8px; width: 2px; background: #e3eaf4; }
    .t-item { position: relative; padding: 14px 0; }
    .t-item .t-dot { position: absolute; left: -28px; top: 18px; width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 2px solid #d1d5db; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #9ca3af; }
    .t-item.done .t-dot { border-color: var(--success); color: var(--success); }
    .t-item.fail .t-dot { border-color: var(--danger); color: var(--danger); }
    .t-item.current .t-dot { border-color: var(--primary); color: var(--primary); background: #eff6ff; }
    .t-item .t-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .t-item .t-time { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .t-item .t-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

    .process-flow { display: flex; align-items: center; gap: 12px; }
    .p-step { flex: 1; border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; background: #fbfcfe; transition: all .2s; cursor: pointer; }
    .p-step:hover { border-color: #bfdbfe; background: #f8fbff; }
    .p-step.active { border-color: var(--primary); background: #eff6ff; }
    .p-step .p-num { width: 32px; height: 32px; border-radius: 50%; background: #e3eaf4; color: #6b7280; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-weight: 700; font-size: 14px; }
    .p-step.done .p-num { background: #d1fae5; color: #047857; }
    .p-step.active .p-num { background: var(--primary); color: #fff; }
    .p-step strong { font-size: 14px; display: block; margin-bottom: 4px; }
    .p-step span { font-size: 12px; color: var(--text-secondary); }
    .p-arrow { color: #d1d5db; font-size: 20px; }

    .qr-block { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .qr-placeholder { width: 140px; height: 140px; border: 1px solid var(--border); border-radius: 12px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 48px; color: #d1d5db; }
    .qr-info { flex: 1; min-width: 200px; }
    .qr-info .url { background: #f8fafc; border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; font-size: 13px; color: var(--primary); word-break: break-all; margin-top: 8px; display: block; }

    .fab-bar { position: fixed; right: 24px; bottom: 24px; display: flex; flex-direction: column; gap: 10px; z-index: 50; }
    .fab { width: 52px; height: 52px; border-radius: 50%; border: none; background: var(--primary); color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 14px rgba(45,121,234,0.35); transition: transform .2s; }
    .fab:hover { transform: scale(1.08); }
    .fab.success { background: var(--success); box-shadow: 0 4px 14px rgba(16,185,129,0.3); }
    .fab-menu { position: absolute; right: 0; bottom: 60px; background: #fff; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,0.1); padding: 8px; min-width: 180px; display: none; flex-direction: column; gap: 4px; }
    .fab-menu.open { display: flex; }
    .fab-item { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .fab-item:hover { background: #f8fafc; }

    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .kpi-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); display: grid; grid-template-columns: 56px 1fr; gap: 16px; align-items: center; }
    .kpi-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; }
    .kpi-icon.blue { background: #2d79ea; } .kpi-icon.green { background: #10b981; } .kpi-icon.orange { background: #f97316; } .kpi-icon.purple { background: #6366f1; }
    .kpi-title { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .kpi-value { font-size: 28px; font-weight: 700; color: var(--text-main); line-height: 1; }
    .kpi-note { font-size: 12px; color: #8c99aa; margin-top: 4px; }

    .workflow-flow { display: flex; align-items: stretch; gap: 10px; }
    .workflow-step { flex: 1; min-width: 0; border: 1px solid #e6ebf2; border-radius: 10px; padding: 14px 10px 12px; background: #fbfcfe; text-align: center; }
    .workflow-step__badge { width: 26px; height: 26px; border-radius: 50%; background: #2d79ea; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; margin: 0 auto 10px; }
    .workflow-step__icon { width: 38px; height: 38px; border-radius: 10px; background: rgba(45,121,234,0.1); color: #2d79ea; display: flex; align-items: center; justify-content: center; font-size: 18px; margin: 0 auto 10px; }
    .workflow-step strong { display: block; margin-bottom: 4px; color: #17324f; font-size: 14px; }
    .workflow-step span { color: #6f7e92; font-size: 12px; line-height: 1.45; }
    .workflow-arrow { display: flex; align-items: center; justify-content: center; color: #7a90ad; font-size: 16px; }

    .warning-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; border: 1px solid #e7edf5; border-radius: 10px; background: #fbfcfe; padding: 12px 14px; margin-bottom: 10px; }
    .warning-item__main strong { display: block; margin-bottom: 4px; color: #17324f; font-size: 13px; }
    .warning-item__main span { color: #6f7e92; font-size: 12px; line-height: 1.45; }
    .warning-item__side { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    .stats-line { border: 1px solid #e7edf5; border-radius: 10px; background: #fbfcfe; padding: 12px 14px; margin-bottom: 10px; }
    .stats-line__head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .stats-line__head strong { color: #17324f; font-size: 13px; }
    .stats-line__head span { color: #17324f; font-weight: 700; }
    .stats-line__bar { height: 8px; border-radius: 999px; background: #edf2f8; overflow: hidden; }
    .stats-line__fill { height: 100%; border-radius: inherit; background: #2d79ea; }

    .table-footer { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding-top: 14px; }
    .table-footer__summary { color: #6f7e92; font-size: 13px; }

    .toolbar { display: grid; grid-template-columns: 1.5fr minmax(180px,1fr) minmax(180px,1fr) repeat(3, minmax(160px,0.85fr)) auto; gap: 12px; align-items: end; margin-bottom: 14px; }
    .toolbar-field label { display: block; margin-bottom: 6px; color: #6f7e92; font-size: 12px; }
    .toolbar-actions { display: flex; align-items: center; gap: 10px; padding-bottom: 1px; }

    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(180deg, #eef7f5, #ffffff); }
    .login-card { width: 100%; max-width: 460px; border-radius: 16px; background: #fff; border: 1px solid var(--border); box-shadow: var(--shadow); padding: 32px; }
    .login-card h2 { margin: 0 0 8px; font-size: 24px; }
    .login-card p { margin: 0 0 24px; color: #606266; font-size: 14px; }

    .public-page { min-height: 100vh; background: #f5f7fa; }
    .public-header { background: linear-gradient(135deg, #0a3f79 0%, #1a5cad 100%); color: #fff; padding: 48px 24px; text-align: center; }
    .public-header h1 { margin: 0 0 12px; font-size: 32px; font-weight: 700; }
    .public-body { max-width: 720px; margin: 0 auto; padding: 24px 16px 48px; display: grid; gap: 20px; }
    .public-card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .public-card__title { margin: 0 0 16px; font-size: 18px; color: #0a3f79; padding-bottom: 10px; border-bottom: 2px solid #e8eef8; }
    .public-table { width: 100%; border-collapse: collapse; }
    .public-table tr { border-bottom: 1px solid #f0f3f8; }
    .public-table td { padding: 10px 0; font-size: 14px; line-height: 1.6; }
    .public-table td.label { width: 180px; color: #6f7e92; font-weight: 500; }

    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0 16px; }
    .page-alert { margin-bottom: 20px; }
    .user-info-bar { margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; color: #606266; font-size: 14px; padding: 14px 16px; border-radius: 14px; background: linear-gradient(180deg, #f8fbfd, #eef3f8); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-state .mdi { font-size: 48px; color: #d1d5db; margin-bottom: 12px; display: block; }
    .empty-state strong { display: block; color: var(--text-main); margin-bottom: 8px; }

    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #fff; border: 1px solid var(--border); padding: 12px 20px; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; opacity: 0; pointer-events: none; transition: all .3s; z-index: 100; font-size: 14px; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 1200px) {
      .info-row, .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .workflow-flow { flex-wrap: wrap; }
      .workflow-arrow { display: none; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-icon"><span class="mdi mdi-fish"></span></div>
      <div class="brand-text">
        <strong>水产监管系统</strong>
        <span>Aquatic Processing</span>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-group">
        <div class="nav-label">监管中心</div>
        <button class="nav-item active" onclick="goPage('home')">
          <span class="mdi mdi-view-dashboard-outline"></span>
          <span>首页 Dashboard</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-label">批次管理</div>
        <button class="nav-item" onclick="goPage('batch-list')">
          <span class="mdi mdi-format-list-bulleted"></span>
          <span>批次总览列表</span>
        </button>
        <button class="nav-item" onclick="goPage('batch-create')">
          <span class="mdi mdi-plus-circle-outline"></span>
          <span>原料登记入库</span>
        </button>
        <button class="nav-item" onclick="goPage('scan-entry')">
          <span class="mdi mdi-qrcode-scan"></span>
          <span>扫码快速录入</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-label">质量管控</div>
        <button class="nav-item" onclick="goPage('inspection-workbench')">
          <span class="mdi mdi-clipboard-text-search-outline"></span>
          <span>质检工作台</span>
        </button>
        <button class="nav-item" onclick="goPage('inspection-records')">
          <span class="mdi mdi-file-document-multiple-outline"></span>
          <span>质检记录档案</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-label">放行与追溯</div>
        <button class="nav-item" onclick="goPage('release-management')">
          <span class="mdi mdi-check-circle-outline"></span>
          <span>产品放行管理</span>
        </button>
        <button class="nav-item" onclick="goPage('traceability-records')">
          <span class="mdi mdi-barcode"></span>
          <span>追溯记录中心</span>
        </button>
        <button class="nav-item" onclick="goPage('public-trace')">
          <span class="mdi mdi-earth"></span>
          <span>公共追溯查询</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-label">系统管理</div>
        <button class="nav-item" onclick="goPage('users')">
          <span class="mdi mdi-account-group-outline"></span>
          <span>人员权限管理</span>
        </button>
        <button class="nav-item" onclick="goPage('enterprise-info')">
          <span class="mdi mdi-office-building-outline"></span>
          <span>企业信息管理</span>
        </button>
        <button class="nav-item" onclick="goPage('system-settings')">
          <span class="mdi mdi-bullhorn-outline"></span>
          <span>系统公告</span>
        </button>
      </div>

      <div class="nav-group" style="margin-top:auto">

let currentPage = 'home';

function render(page) {
  currentPage = page;
  const content = document.getElementById('content');
  const fn = PAGES[page] || PAGES['home'];
  content.innerHTML = fn();

  // Update sidebar active
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const map = {
    'home':0, 'batch-list':1, 'batch-create':2, 'scan-entry':3,
    'inspection-workbench':4, 'inspection-records':5,
    'release-management':6, 'traceability-records':7, 'public-trace':8,
    'users':9, 'enterprise-info':10, 'system-settings':11, 'profile':12
  };
  const idx = map[page];
  if (idx !== undefined) {
    const items = document.querySelectorAll('.nav-item');
    if (items[idx]) items[idx].classList.add('active');
  }

  // Update topbar title
  const titles = {
    'home': ['首页 Dashboard','Supervision Dashboard — 生产主管视图'],
    'batch-list': ['批次总览列表','Batch Supervision Center'],
    'batch-create': ['原料登记入库','Batch Registration'],
    'scan-entry': ['扫码快速录入','Batch Scan Entry'],
    'batch-detail': ['批次监管详情','Batch Supervision Detail'],
    'inspection-workbench': ['质检工作台','Inspection Workbench'],
    'inspection-records': ['质检记录档案','Inspection Records'],
    'release-management': ['产品放行管理','Release Management'],
    'traceability-records': ['追溯记录中心','Traceability Records'],
    'public-trace': ['公共追溯查询','Public Traceability Preview'],
    'users': ['人员权限管理','User Management'],
    'enterprise-info': ['企业信息管理','Enterprise Info'],
    'system-settings': ['系统公告','System Announcements'],
    'profile': ['个人资料','Profile'],
    'login': ['登录','Login']
  };
  const t = titles[page] || titles['home'];
  document.getElementById('topTitle').textContent = t[0];
  document.getElementById('topSub').textContent = t[1];
}

function goPage(page) {
  if (page === 'login') { render('login'); return; }
  render(page);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}
function toggleSubmenu(btn) {
  btn.classList.toggle('expanded');
  if (btn.nextElementSibling) btn.nextElementSibling.classList.toggle('open');
}
function switchTab(btn, id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Init
render('home');
